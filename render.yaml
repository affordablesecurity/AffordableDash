services:
  - type: web
    name: affordable-dash
    runtime: node
    plan: starter
    buildCommand: npm install && npm run generate --workspace server && npm run build
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://affordable-dash.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: affordable-dash-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: VOIPMS_USERNAME
        sync: false
      - key: VOIPMS_API_PASSWORD
        sync: false
      - key: VOIPMS_DID
        sync: false
      - key: HOUSECALL_PRO_API_KEY
        sync: false
      - key: HOUSECALL_PRO_WEBHOOK_SECRET
        sync: false

databases:
  - name: affordable-dash-db
    plan: starter
